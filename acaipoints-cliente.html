<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AçaíPoints — Meus Pontos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --brand:#6D28D9;--brand2:#7C3AED;--brand-dark:#4C1D95;
  --brand-light:#EDE9FE;--brand-mid:#C4B5FD;
  --green:#059669;--green-light:#D1FAE5;
  --red:#DC2626;--red-light:#FEE2E2;
  --bg:#0C0818;--card:#160F2E;--card2:#1F1640;
  --text:#F3EFFF;--muted:#9D8EC0;--border:#2D1F60;
  --font:'Sora',sans-serif;--mono:'Space Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;overflow-x:hidden}

/* ── HERO ── */
.hero{
  background:linear-gradient(160deg,#4C1D95 0%,#6D28D9 40%,#7C3AED 70%,#A855F7 100%);
  padding:2.5rem 1.5rem 5rem;text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(236,72,153,.25) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(99,102,241,.3) 0%,transparent 50%);
}
.hero-content{position:relative;z-index:1}
.hero-logo{width:72px;height:72px;background:rgba(255,255,255,.15);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 1rem;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.hero-title{font-size:28px;font-weight:900;color:white;letter-spacing:-.5px;margin-bottom:.25rem}
.hero-sub{font-size:13px;color:rgba(255,255,255,.7);font-weight:500;letter-spacing:.5px;text-transform:uppercase}

/* ── SEARCH CARD (overlapping hero) ── */
.search-section{padding:0 1.25rem;margin-top:-3rem;position:relative;z-index:10;margin-bottom:1.5rem}
.search-card{background:var(--card);border-radius:20px;padding:1.5rem;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.search-title{font-size:16px;font-weight:700;margin-bottom:.25rem;color:var(--text)}
.search-sub{font-size:12px;color:var(--muted);margin-bottom:1rem}
.srch-wrap{position:relative}
.srch-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.srch-inp{width:100%;padding:.875rem 1rem .875rem 3rem;border:2px solid var(--border);border-radius:12px;font-size:15px;background:var(--card2);color:var(--text);font-family:var(--font);transition:.15s}
.srch-inp:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 4px rgba(109,40,217,.2)}
.srch-inp::placeholder{color:var(--muted)}
.search-results{margin-top:.75rem}

/* ── CUSTOMER CARD ── */
.cust-card{background:linear-gradient(135deg,var(--brand-dark) 0%,var(--brand2) 100%);border-radius:18px;padding:1.5rem;color:white;position:relative;overflow:hidden;margin-bottom:1.25rem;box-shadow:0 8px 32px rgba(109,40,217,.4)}
.cust-card::before{content:'🍇';position:absolute;right:-10px;top:-15px;font-size:100px;opacity:.08;transform:rotate(15deg)}
.cust-card::after{content:'';position:absolute;bottom:-20px;left:-20px;width:120px;height:120px;background:rgba(255,255,255,.05);border-radius:50%}
.cust-card-top{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;position:relative;z-index:1}
.cust-av{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;border:2px solid rgba(255,255,255,.3);flex-shrink:0}
.cust-card-name{font-size:20px;font-weight:800;letter-spacing:-.3px}
.cust-card-tel{font-size:12px;opacity:.7;margin-top:2px}
.pts-display{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.5rem;position:relative;z-index:1}
.pts-num{font-size:52px;font-weight:900;font-family:var(--mono);line-height:1;letter-spacing:-2px}
.pts-unit{font-size:16px;font-weight:600;opacity:.8}
.tier-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700;backdrop-filter:blur(8px);position:relative;z-index:1}

/* ── PROGRESS ── */
.prog-section{margin-bottom:1.25rem}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:.375rem;font-weight:600}
.prog-bar{height:10px;background:var(--border);border-radius:100px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--brand),#A855F7,#EC4899);border-radius:100px;transition:width 1s cubic-bezier(.34,1.4,.64,1)}

/* ── STATS STRIP ── */
.stats-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.625rem;margin-bottom:1.5rem}
.strip-stat{background:var(--card);border-radius:14px;padding:.875rem .75rem;text-align:center;border:1px solid var(--border)}
.strip-val{font-size:22px;font-weight:800;color:var(--brand);font-family:var(--mono);line-height:1}
.strip-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;font-weight:600}

/* ── SECTION ── */
.section{padding:0 1.25rem;margin-bottom:1.5rem}
.sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:.875rem;display:flex;align-items:center;gap:.5rem}

/* ── REWARD CARD ── */
.rwd-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:.625rem;display:flex;align-items:center;gap:.875rem;transition:.15s}
.rwd-card.available{border-color:rgba(109,40,217,.4);cursor:pointer}
.rwd-card.available:active{transform:scale(.98);background:var(--card2)}
@media(hover:hover){.rwd-card.available:hover{border-color:var(--brand);background:rgba(109,40,217,.05)}}
.rwd-ico{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,rgba(109,40,217,.2),rgba(168,85,247,.1));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid var(--border)}
.rwd-name{font-weight:700;font-size:14px}
.rwd-desc{font-size:12px;color:var(--muted)}
.rwd-badge{padding:4px 12px;border-radius:100px;font-size:12px;font-weight:800;font-family:var(--mono);white-space:nowrap}
.rwd-badge.ok{background:linear-gradient(135deg,var(--brand),var(--brand2));color:white}
.rwd-badge.locked{background:var(--card2);color:var(--muted);border:1px solid var(--border)}

/* ── HISTORY ── */
.tx-row{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--border)}
.tx-row:last-child{border-bottom:none}
.tx-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.tx-title{font-size:13px;font-weight:600}
.tx-date{font-size:11px;color:var(--muted)}
.tx-pts{font-size:14px;font-weight:800;text-align:right;white-space:nowrap;font-family:var(--mono)}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:2rem 1rem;color:var(--muted)}
.empty-ico{font-size:44px;margin-bottom:.75rem}

.result-item{display:flex;align-items:center;gap:.75rem;padding:.875rem;border-radius:12px;background:var(--card2);border:1px solid var(--border);margin-bottom:.5rem;cursor:pointer;transition:.15s}
.result-item:active{transform:scale(.98)}
@media(hover:hover){.result-item:hover{border-color:var(--brand);background:rgba(109,40,217,.08)}}
.result-name{font-weight:700;font-size:14px}
.result-sub{font-size:12px;color:var(--muted)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.modal{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:1.5rem;animation:slideUp .3s cubic-bezier(.34,1.3,.64,1)}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:44px;height:4px;background:var(--border);border-radius:100px;margin:-.75rem auto 1.25rem}
.modal-title{font-size:19px;font-weight:800;margin-bottom:1rem;letter-spacing:-.3px}

/* ── NOTIFICATION ── */
.notif{position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#059669,#10B981);color:white;padding:.75rem 1.5rem;border-radius:100px;font-size:13.5px;font-weight:600;z-index:9999;white-space:nowrap;max-width:92vw;text-align:center;animation:notifIn .3s cubic-bezier(.34,1.5,.64,1);pointer-events:none;box-shadow:0 4px 20px rgba(5,150,105,.4)}
@keyframes notifIn{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:.65rem 1.25rem;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:var(--font);transition:.15s}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:white;box-shadow:0 2px 12px rgba(109,40,217,.4)}
.btn-outline{background:transparent;color:var(--brand);border:2px solid var(--border)}
.btn-outline:hover{background:rgba(109,40,217,.1);border-color:var(--brand)}
.btn-block{width:100%}
.btn-sm{padding:.375rem .875rem;font-size:12.5px;border-radius:8px}
.mt1{margin-top:.5rem}.mt2{margin-top:1rem}

/* ── STARS ── */
.stars{display:flex;justify-content:center;gap:4px;margin:1rem 0}
.star{font-size:28px;filter:grayscale(1);transition:.15s}
.star.lit{filter:none;animation:popStar .3s cubic-bezier(.34,1.5,.64,1)}
@keyframes popStar{0%{transform:scale(.5)}100%{transform:scale(1)}}

/* ── BACK BTN ── */
.back-btn{background:none;border:none;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:.25rem;padding:.25rem 0;position:relative;z-index:1;margin-bottom:1rem}
.back-btn:hover{color:white}
</style>
</head>
<body>

<div id="app">
  <!-- Estado: busca -->
  <div id="screen-search">
    <div class="hero">
      <div class="hero-content">
        <div class="hero-logo">🍇</div>
        <div class="hero-title" id="loja-nome">AçaíPoints</div>
        <div class="hero-sub">Programa de Fidelidade</div>
      </div>
    </div>
    <div class="search-section">
      <div class="search-card">
        <div class="search-title">🔍 Consulte seus pontos</div>
        <div class="search-sub">Digite seu nome ou telefone</div>
        <div class="srch-wrap">
          <span class="srch-ico">📱</span>
          <input class="srch-inp" id="search-inp" placeholder="Ex: João Silva ou 99999-9999" oninput="onSearch(this.value)" autocomplete="off">
        </div>
        <div class="search-results" id="search-results"></div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">🎁 Prêmios disponíveis</div>
      <div id="rewards-preview"></div>
    </div>
  </div>

  <!-- Estado: perfil do cliente -->
  <div id="screen-profile" style="display:none">
    <div class="hero" style="padding-bottom:5.5rem">
      <div class="hero-content">
        <button class="back-btn" onclick="goBack()">← Voltar</button>
        <div id="profile-card"></div>
      </div>
    </div>

    <div style="padding:0 1.25rem;margin-top:-3.5rem;position:relative;z-index:10">
      <div id="profile-progress"></div>
    </div>

    <div class="stats-strip" style="padding:0 1.25rem" id="profile-stats"></div>

    <div class="section">
      <div class="sec-title">🎁 Resgatar Prêmios</div>
      <div id="profile-rewards"></div>
    </div>

    <div class="section">
      <div class="sec-title">📋 Histórico</div>
      <div class="rwd-card" style="display:block;cursor:default" id="profile-history">
        <div style="text-align:center;padding:.5rem;color:var(--muted);font-size:13px">Carregando...</div>
      </div>
    </div>
  </div>

  <!-- Modal de confirmação de resgate -->
  <div id="overlay" class="overlay" style="display:none" onclick="overlayClick(event)">
    <div class="modal"><div class="modal-handle"></div><div id="modal-body"></div></div>
  </div>

  <div id="notif" class="notif" style="display:none"></div>
</div>

<script>
// ── SUPABASE ───────────────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(
  'https://hnculphposmgfvaeliiw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuY3VscGhwb3NtZ2Z2YWVsaWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTE4MDIsImV4cCI6MjA5MDM4NzgwMn0.mlkDEf0HI6XQm2mX7Ee3CWcR8WxevJiy3l2xBdvTaNM'
);

// ── CONSTANTS ──────────────────────────────────────────────
const TIERS=[
  {nome:'Iniciante',min:0,max:49,icon:'⭐'},
  {nome:'Bronze',min:50,max:149,icon:'🥉'},
  {nome:'Prata',min:150,max:349,icon:'🥈'},
  {nome:'Ouro',min:350,max:699,icon:'🥇'},
  {nome:'Diamante',min:700,max:Infinity,icon:'💎'},
];
const AV_COLORS=['#6D28D9','#059669','#DC2626','#D97706','#0891B2','#BE185D','#065F46','#1D4ED8','#9333EA','#C2410C'];

// ── STATE ──────────────────────────────────────────────────
let rewards=[];
let config={reais_por_ponto:10,nome_loja:'AçaíPoints'};
let currentCustomer=null;
let searchTimer=null;

// ── INIT ───────────────────────────────────────────────────
async function init(){
  try{
    const[{data:rwds},{data:cfg}]=await Promise.all([
      sb.from('rewards').select('*').eq('ativo',true).order('pontos'),
      sb.from('config').select('*').eq('id',1).single(),
    ]);
    rewards=rwds||[];
    if(cfg){config=cfg;document.getElementById('loja-nome').textContent=cfg.nome_loja||'AçaíPoints';document.title=`${cfg.nome_loja||'AçaíPoints'} — Meus Pontos`;}
    renderRewardsPreview();
  }catch(e){console.error(e);}
}

// ── HELPERS ────────────────────────────────────────────────
function getTier(total){return TIERS.find(t=>total>=t.min&&total<=t.max)||TIERS[0];}
function avColor(id){let h=0;for(let i=0;i<id.length;i++)h=(h*31+id.charCodeAt(i))&0xffff;return AV_COLORS[h%AV_COLORS.length];}
function initials(n){const p=n.trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase();}
function fmtDate(iso){
  const d=new Date(iso),t=new Date();const yd=new Date(t);yd.setDate(t.getDate()-1);
  if(d.toDateString()===t.toDateString())return'Hoje '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(d.toDateString()===yd.toDateString())return'Ontem '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'});
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let notifTimer;
function toast(msg,ms=3000,green=true){
  const el=document.getElementById('notif');
  el.textContent=msg;
  el.style.background=green?'linear-gradient(135deg,#059669,#10B981)':'linear-gradient(135deg,#DC2626,#EF4444)';
  el.style.display='block';
  clearTimeout(notifTimer);notifTimer=setTimeout(()=>el.style.display='none',ms);
}

// ── SEARCH ─────────────────────────────────────────────────
function onSearch(val){
  clearTimeout(searchTimer);
  const q=val.trim();
  if(q.length<2){document.getElementById('search-results').innerHTML='';return;}
  document.getElementById('search-results').innerHTML=`<div style="text-align:center;padding:.75rem;color:var(--muted);font-size:13px">Buscando...</div>`;
  searchTimer=setTimeout(()=>doSearch(q),400);
}

async function doSearch(q){
  try{
    const{data}=await sb.from('customers').select('id,nome,tel,pontos,total')
      .or(`nome.ilike.%${q}%,tel.ilike.%${q}%`).limit(5);
    renderSearchResults(data||[],q);
  }catch(e){
    document.getElementById('search-results').innerHTML=`<div style="text-align:center;padding:.75rem;color:var(--red);font-size:13px">Erro ao buscar. Tente novamente.</div>`;
  }
}

function renderSearchResults(list,q){
  const el=document.getElementById('search-results');
  if(list.length===0){
    el.innerHTML=`<div style="text-align:center;padding:1rem;color:var(--muted);font-size:13px">Nenhum cliente encontrado para "<b>${escHtml(q)}</b>"</div>`;
    return;
  }
  el.innerHTML=list.map(c=>`
    <div class="result-item" onclick="openProfile('${c.id}')">
      <div style="width:40px;height:40px;border-radius:50%;background:${avColor(c.id)};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;flex-shrink:0">${initials(c.nome)}</div>
      <div style="flex:1;min-width:0">
        <div class="result-name">${escHtml(c.nome)}</div>
        <div class="result-sub">${c.tel||'Sem telefone'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:18px;font-weight:800;color:var(--brand);font-family:var(--mono)">${c.pontos}</div>
        <div style="font-size:10px;color:var(--muted)">pontos</div>
      </div>
    </div>
  `).join('');
}

// ── REWARDS PREVIEW ────────────────────────────────────────
function renderRewardsPreview(){
  const el=document.getElementById('rewards-preview');
  if(!rewards.length){el.innerHTML='';return;}
  el.innerHTML=rewards.slice(0,4).map(r=>`
    <div class="rwd-card">
      <div class="rwd-ico">${r.emoji}</div>
      <div style="flex:1;min-width:0"><div class="rwd-name">${escHtml(r.nome)}</div><div class="rwd-desc">${escHtml(r.descricao||'')}</div></div>
      <div class="rwd-badge locked">${r.pontos} pts</div>
    </div>
  `).join('');
}

// ── PROFILE ────────────────────────────────────────────────
async function openProfile(cid){
  document.getElementById('screen-search').style.display='none';
  document.getElementById('screen-profile').style.display='block';
  document.getElementById('profile-history').innerHTML=`<div style="text-align:center;padding:.5rem;color:var(--muted);font-size:13px">Carregando...</div>`;

  try{
    const[{data:c},{data:txs}]=await Promise.all([
      sb.from('customers').select('*').eq('id',cid).single(),
      sb.from('transactions').select('*').eq('customer_id',cid).order('created_at',{ascending:false}).limit(20),
    ]);
    currentCustomer=c;
    renderProfile(c,txs||[]);
  }catch(e){
    toast('Erro ao carregar perfil',3000,false);goBack();
  }
}

function renderProfile(c,txs){
  const tier=getTier(c.total);
  const next=TIERS.find(t=>t.min>c.total);
  const prog=next?Math.min(100,Math.round(((c.total-tier.min)/(next.min-tier.min))*100)):100;

  // Card do cliente
  document.getElementById('profile-card').innerHTML=`
    <div class="cust-card-top">
      <div class="cust-av" style="background:${avColor(c.id)}">${initials(c.nome)}</div>
      <div>
        <div class="cust-card-name">${escHtml(c.nome)}</div>
        <div class="cust-card-tel">${c.tel||'Sem telefone'}</div>
      </div>
    </div>
    <div class="pts-display">
      <div class="pts-num">${c.pontos}</div>
      <div class="pts-unit">pontos</div>
    </div>
    <div class="tier-badge">${tier.icon} ${tier.nome}</div>
  `;

  // Progresso
  const progEl=document.getElementById('profile-progress');
  if(next){
    progEl.innerHTML=`
      <div style="background:var(--card);border-radius:14px;padding:1rem;border:1px solid var(--border);margin-bottom:1.25rem">
        <div class="prog-label"><span>${tier.icon} ${tier.nome}</span><span>Próximo: ${next.icon} ${next.nome}</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:0%" id="prog-fill-el"></div></div>
        <div style="font-size:11px;color:var(--muted);margin-top:.375rem;text-align:right">Faltam <b style="color:var(--brand)">${next.min-c.total} pontos</b> para ${next.nome}</div>
      </div>`;
    setTimeout(()=>{const el=document.getElementById('prog-fill-el');if(el)el.style.width=prog+'%';},100);
  }else{
    progEl.innerHTML=`<div style="background:linear-gradient(135deg,#4C1D95,#7C3AED);border-radius:14px;padding:1rem;text-align:center;margin-bottom:1.25rem;color:white;font-weight:700">💎 Nível Máximo — Diamante!</div>`;
  }

  // Stats
  document.getElementById('profile-stats').innerHTML=`
    <div class="strip-stat"><div class="strip-val">${c.pontos}</div><div class="strip-lbl">Disponíveis</div></div>
    <div class="strip-stat"><div class="strip-val">${c.total}</div><div class="strip-lbl">Acumulados</div></div>
    <div class="strip-stat"><div class="strip-val">${c.resgatados}</div><div class="strip-lbl">Resgatados</div></div>
  `;

  // Prêmios
  const avail=rewards.filter(r=>r.pontos<=c.pontos);
  const locked=rewards.filter(r=>r.pontos>c.pontos);
  document.getElementById('profile-rewards').innerHTML=`
    ${avail.length===0&&locked.length===0?`<div class="empty"><div class="empty-ico">🎁</div><p style="font-size:13px">Nenhum prêmio disponível</p></div>`:''}
    ${avail.map(r=>`
      <div class="rwd-card available" onclick="confirmResgate('${c.id}',${r.id})">
        <div class="rwd-ico">${r.emoji}</div>
        <div style="flex:1;min-width:0"><div class="rwd-name">${escHtml(r.nome)}</div><div class="rwd-desc">${escHtml(r.descricao||'')}</div></div>
        <div class="rwd-badge ok">${r.pontos} pts</div>
      </div>`).join('')}
    ${locked.length?`<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:.75rem 0 .5rem">Bloqueados</div>
    ${locked.map(r=>`
      <div class="rwd-card">
        <div class="rwd-ico" style="opacity:.5">${r.emoji}</div>
        <div style="flex:1;min-width:0;opacity:.5"><div class="rwd-name">${escHtml(r.nome)}</div><div class="rwd-desc">Faltam ${r.pontos-c.pontos} pontos</div></div>
        <div class="rwd-badge locked">${r.pontos} pts</div>
      </div>`).join('')}`:''}
  `;

  // Histórico
  document.getElementById('profile-history').innerHTML=`
    ${txs.length===0?`<div style="text-align:center;padding:1rem;color:var(--muted);font-size:13px">Sem transações ainda</div>`:
    txs.map(h=>`<div class="tx-row">
      <div class="tx-ico" style="background:${h.tipo==='compra'?'rgba(5,150,105,.2)':h.tipo==='ajuste'?'rgba(217,119,6,.2)':'rgba(109,40,217,.2)'}">${h.tipo==='compra'?'💰':h.tipo==='ajuste'?'✏️':'🎁'}</div>
      <div style="flex:1"><div class="tx-title">${escHtml(h.descricao||'')}</div><div class="tx-date">${fmtDate(h.created_at)}</div></div>
      <div class="tx-pts" style="color:${h.pts>0?'#4ade80':'#f87171'}">${h.pts>0?'+':''}${h.pts} pts</div>
    </div>`).join('')}
  `;

  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  document.getElementById('screen-profile').style.display='none';
  document.getElementById('screen-search').style.display='block';
  document.getElementById('search-inp').value='';
  document.getElementById('search-results').innerHTML='';
  currentCustomer=null;
}

// ── RESGATE ────────────────────────────────────────────────
function confirmResgate(cid,rid){
  const r=rewards.find(x=>x.id===rid);
  const c=currentCustomer;
  if(!r||!c)return;
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-title">🎁 Confirmar Resgate</div>
    <div style="text-align:center;padding:1rem 0">
      <div style="font-size:52px;margin-bottom:.5rem">${r.emoji}</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:.25rem">${escHtml(r.nome)}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:1.25rem">${escHtml(r.descricao||'')}</div>
      <div style="background:var(--card2);border-radius:12px;padding:1rem;border:1px solid var(--border);margin-bottom:1.25rem">
        <div style="font-size:12px;color:var(--muted);font-weight:600;margin-bottom:.375rem">SEUS PONTOS APÓS RESGATE</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:.75rem">
          <span style="font-size:22px;font-weight:800;font-family:var(--mono);color:var(--muted)">${c.pontos}</span>
          <span style="color:var(--muted)">→</span>
          <span style="font-size:28px;font-weight:900;font-family:var(--mono);color:var(--brand)">${c.pontos-r.pontos}</span>
        </div>
        <div style="font-size:11px;color:var(--red);margin-top:.25rem">−${r.pontos} pontos</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:1rem">⚠️ Confirme com o atendente antes de resgatar</div>
    <button class="btn btn-primary btn-block" id="confirm-resgate-btn" onclick="doResgate('${cid}',${rid})">✅ Confirmar com atendente</button>
    <button class="btn btn-outline btn-block mt1" onclick="closeModal()">Cancelar</button>
  `;
  document.getElementById('overlay').style.display='flex';
}

async function doResgate(cid,rid){
  const r=rewards.find(x=>x.id===rid);
  const c=currentCustomer;if(!r||!c)return;
  const btn=document.getElementById('confirm-resgate-btn');
  if(btn){btn.disabled=true;btn.textContent='Aguarde...';}
  try{
    if(c.pontos<r.pontos){toast('Pontos insuficientes',3000,false);closeModal();return;}
    const{error:e1}=await sb.from('customers').update({pontos:c.pontos-r.pontos,resgatados:c.resgatados+r.pontos}).eq('id',cid);
    if(e1)throw e1;
    const{error:e2}=await sb.from('transactions').insert({customer_id:cid,tipo:'resgate',pts:-r.pontos,descricao:r.nome});
    if(e2)throw e2;
    c.pontos-=r.pontos;c.resgatados+=r.pontos;
    closeModal();
    toast(`🎉 ${r.nome} resgatado!`);
    // re-render com dados atualizados
    const{data:txs}=await sb.from('transactions').select('*').eq('customer_id',cid).order('created_at',{ascending:false}).limit(20);
    renderProfile(c,txs||[]);
  }catch(e){toast('Erro ao resgatar. Avise o atendente.',3000,false);if(btn){btn.disabled=false;btn.textContent='✅ Confirmar com atendente';}}
}

function closeModal(){document.getElementById('overlay').style.display='none';}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

// ── INIT ───────────────────────────────────────────────────
init();
</script>
</body>
</html>
